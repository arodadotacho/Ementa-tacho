<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>À Roda do Tacho</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f1ef; padding: 15px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; border-top: 8px solid #8E5D42; }
        h1 { color: #8E5D42; text-align: center; }
        .prato-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        select, input { padding: 5px; border-radius: 5px; border: 1px solid #ccc; }
        .btn { width: 100%; background: #8E5D42; color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>À Roda do Tacho</h1>
        <div id="lista">
            <div class="prato-row" data-nome="Bacalhau com Natas">
                <span>Bacalhau com Natas</span>
                <select class="tam"><option>Pequena</option><option>Média Pequena</option><option>Média Grande</option><option>Grande</option></select>
                <input type="number" class="qtd" value="0" min="0" style="width: 40px;">
            </div>
            <div class="prato-row" data-nome="Arroz de Pato">
                <span>Arroz de Pato</span>
                <select class="tam"><option>Pequena</option><option>Média Pequena</option><option>Média Grande</option><option>Grande</option></select>
                <input type="number" class="qtd" value="0" min="0" style="width: 40px;">
            </div>
            </div>

        <div style="margin-top:20px;">
            <label>O seu Nome:</label><br>
            <input type="text" id="nome" style="width:100%;"><br><br>
            <label>Hora de Levantamento:</label><br>
            <input type="time" id="hora" style="width:100%;">
        </div>

        <button class="btn" onclick="enviar()">ENVIAR PEDIDO WHATSAPP</button>
    </div>

    <script>
        function enviar() {
            const nome = document.getElementById('nome').value;
            const hora = document.getElementById('hora').value;
            if(!nome || !hora) { alert("Preencha nome e hora"); return; }
            let msg = `*PEDIDO À RODA DO TACHO*%0A*Cliente:* ${nome}%0A*Hora:* ${hora}%0A%0A`;
            document.querySelectorAll('.prato-row').forEach(p => {
                const q = p.querySelector('.qtd').value;
                if(q > 0) {
                    msg += `✅ ${q}x ${p.getAttribute('data-nome')} (${p.querySelector('.tam').value})%0A`;
                }
            });
            window.open(`https://api.whatsapp.com/send?phone=351966496713&text=${msg}`);
        }
    </script>
</body>
</html>
